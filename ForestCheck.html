<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForestCheck</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#1A3D28;min-height:100vh}
.screen{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.screen.active{display:flex}
/* BIENVENIDA */
#sw{background:linear-gradient(160deg,#1A3D28,#2D6A4F,#6B3A2A)}
.title{font-size:32px;font-weight:800;color:#fff;text-align:center;margin-bottom:8px}
.sub{font-size:13px;color:rgba(255,255,255,.7);text-align:center;margin-bottom:32px;letter-spacing:1px;text-transform:uppercase}
.btn-enter{width:100%;max-width:360px;padding:18px;background:#fff;color:#1A3D28;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer}
/* LOGIN */
#sl{background:linear-gradient(160deg,#1A3D28,#2D6A4F,#6B3A2A)}
.box{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:360px}
.box h2{color:#1A3D28;text-align:center;margin-bottom:20px;font-size:20px}
.field{margin-bottom:14px}
.field input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:15px}
.btn-login{width:100%;padding:14px;background:#1A3D28;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.err{color:red;text-align:center;margin-top:10px;display:none}
/* APP */
#sa{background:#F2F2F7}
.topbar{background:#1A3D28;padding:16px;color:#fff;font-size:18px;font-weight:700;width:100%;text-align:center}
.content{padding:20px;width:100%;max-width:480px}
.card{background:#fff;border-radius:14px;padding:20px;margin-bottom:12px;text-align:center}
</style>
</head>
<body>

<!-- BIENVENIDA -->
<div class="screen active" id="sw">
  <div class="title">🌲 ForestCheck</div>
  <div class="sub">Sistema de Inventario Forestal</div>
  <button class="btn-enter" onclick="irLogin()">Ingresar al sistema</button>
</div>

<!-- LOGIN -->
<div class="screen" id="sl">
  <div class="box">
    <h2>ForestCheck</h2>
    <div class="field"><input type="text" id="fu" placeholder="usuario" autocapitalize="none" autocorrect="off"></div>
    <div class="field"><input type="password" id="fp" placeholder="contraseña"></div>
    <button class="btn-login" onclick="irApp()">Ingresar</button>
    <div class="err" id="err">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div class="screen" id="sa">
  <div class="topbar">ForestCheck</div>
  <div class="content">
    <div class="card">
      <div id="bienvenido" style="font-size:18px;font-weight:700;color:#1A3D28;margin-bottom:8px"></div>
      <div style="color:#666;font-size:14px">Login exitoso ✓</div>
      <button onclick="cerrar()" style="margin-top:16px;padding:10px 20px;background:#C62828;color:#fff;border:none;border-radius:8px;cursor:pointer">Cerrar sesión</button>
    </div>
  </div>
</div>

<script>
var USERS = [
  {id:'admin',       pass:'admin123',   name:'Administrador'},
  {id:'epv',         pass:'epv123',     name:'EPV'},
  {id:'mcc',         pass:'mcc1055',    name:'MCC'},
  {id:'rmz',         pass:'rmz1055',    name:'RMZ'},
  {id:'hsv',         pass:'hsv1055',    name:'HSV'},
  {id:'forestprueba',pass:'prueba1055', name:'Forest Prueba'}
];

function show(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function irLogin(){
  show('sl');
  setTimeout(function(){ document.getElementById('fu').focus(); }, 100);
}

function irApp(){
  var u = document.getElementById('fu').value.trim().toLowerCase();
  var p = document.getElementById('fp').value;
  var found = null;
  for(var i=0;i<USERS.length;i++){
    if(USERS[i].id===u && USERS[i].pass===p){ found=USERS[i]; break; }
  }
  if(found){
    document.getElementById('err').style.display='none';
    document.getElementById('bienvenido').textContent='Bienvenido, '+found.name;
    document.getElementById('fp').value='';
    show('sa');
  } else {
    document.getElementById('err').style.display='block';
    document.getElementById('fp').value='';
  }
}

function cerrar(){
  document.getElementById('fu').value='';
  show('sw');
}

document.getElementById('fp').addEventListener('keydown', function(e){
  if(e.key==='Enter') irApp();
});
</script>
</body>
</html>
